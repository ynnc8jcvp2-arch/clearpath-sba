<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White background -->
  <rect width="64" height="64" fill="white"/>

  <!-- Building icon (dark navy) -->
  <g transform="translate(32, 32)">
    <g fill="none" stroke="#0A2540" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Roof triangle -->
      <path d="M -10 -6 L 0 -12 L 10 -6" />

      <!-- Base line -->
      <line x1="-10" y1="6" x2="10" y2="6" />

      <!-- Vertical bars/columns -->
      <line x1="-6" y1="-6" x2="-6" y2="6" />
      <line x1="-2" y1="-6" x2="-2" y2="6" />
      <line x1="2" y1="-6" x2="2" y2="6" />
      <line x1="6" y1="-6" x2="6" y2="6" />
    </g>
  </g>
</svg>
